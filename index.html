<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Scriptorium</title>
  <meta name="theme-color" content="#0e0d0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Scriptorium">

  <link rel="icon" type="image/png" href="favicon-32x32.png">
  <link rel="icon" type="image/png" href="favicon-16x16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">

  <style>
    html,body{margin:0;padding:0;background:#0e0d0b;overflow:hidden;height:100%;overscroll-behavior:none;}
    #root{height:100%;display:flex;flex-direction:column;overflow:hidden;}
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    var _startupErrorShown = false;
    window.addEventListener('error', function(e) {
      var root = document.getElementById('root');
      if (root && root.children.length > 0) return;
      if (!e.message || (e.lineno === 0 && e.colno === 0)) return;
      if (_startupErrorShown) return;
      _startupErrorShown = true;
      root.innerHTML =
        '<div style="font-family:monospace;color:#e05555;padding:32px;background:#0e0d0b;min-height:100vh">' +
        '<div style="font-size:18px;margin-bottom:16px">&#9888; Startup Error</div>' +
        '<div style="font-size:13px;color:#c09090;white-space:pre-wrap">' +
        (e.message||'') + '\n\nLine: ' + e.lineno + '  Col: ' + e.colno +
        '</div></div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      e.preventDefault();
    });
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
